{% extends "base.html" %} {% block title %} {{ page_title }} | Habits and Goals
{% endblock %} {% block content %}
<h2>{{ page_title }}</h2>

<form method="post">
  <p>
    <label for="name"> Category Name </label>
    <br />
    <input
      type="text"
      id="name"
      name="name"
      required
      maxlength="40"
      value="{{ category['name'] if category else '' }}"
    />
  </p>

  <button type="submit">Save Category</button>
</form>

<p>
  <a href="{{ url_for('categories.index') }}"> Back to Categories </a>
</p>
{% endblock %}

{% extends "base.html" %}

{% block title %}
    Create Habit | Habits and Goals
{% endblock %}

{% block content %}
    <h2>Create Habit</h2>

    <form method="post">
        <p>
            <label for="name">Habit Name</label>
            <br>
            <input
                type="text"
                id="name"
                name="name"
                required
                maxlength="80">
        </p>
        
        <p>
            <label for="description">Description</label>
            <br>
            <textarea
                id="description"
                name="description"
                rows="4"
            ></textarea>
        </p>

        <p>
            <label for="category_id">Category</label>
            <br>
            <select
                id="category_id"
                name="category_id"
                required>
                <option value="">Select a category</option>
                {% for category in categories %}
                    <option value="{{ category.id }}">
                        {{ category.name }}
                    </option>
                {% endfor %}
            </select>
        </p>

        <p>
            <label for="frequency">Frequency</label>
            <br>
            <select
                id="frequency"
                name="frequency"
                required>
                <option value="">Select frequency</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>
        </p>

        <p>
            <label for="target_amount">Target Amount</label>
            <br>
            <input
                type="number"
                id="target_amount"
                name="target_amount"
                required
                min="0.01"
                step="0.01">
        </p>

        <p>
            <label for="unit">Unit</label>
            <br>
            <input
                type="text"
                id="unit"
                name="unit"
                required
                maxlength="20"
                placeholder="Study time, Water drunk, etc.">
        </p>

        <button type="submit">
            Create Habit
        </button>
    </form>

    <p>
        <a href="{{ url_for('habits.index') }}">
            Back to Habits
        </a>
    </p>

{% endblock %}
    </form>
